<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        body {
            background-color: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #menu-stage {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        #menu-stage video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        #options-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            min-width: 320px;
            background-color: rgba(0, 0, 0, 0.9);
            border: 2px solid #fff;
            color: #fff;
            padding: 18px;
            border-radius: 10px;
            display: none;
            font-family: 'Arial', sans-serif;
        }

        #options-panel h2 {
            margin: 0 0 12px 0;
            font-size: 18px;
            text-align: center;
        }

        #options-panel input[type=range] {
            width: 100%;
        }

        #options-panel .close-btn {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #fff;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <link rel="stylesheet" href="button.css">
    <link rel="stylesheet" href="game.css">
    <div id="game-container">
        <div id="menu-stage">
            <button id="Jouer">Jouer</button>
            <button id="Options">Options</button>
            <button id="Credits">Crédits</button>
            <button id="Quitter">Quitter</button>
        </div>
    </div>

    <div id="options-panel" aria-hidden="true">
        <h2>Options</h2>
        <label for="volume-slider">Volume : <span id="volume-value">100</span>%</label>
        <input id="volume-slider" type="range" min="0" max="100" value="100" step="1">
        <button id="close-options" class="close-btn">Fermer</button>
    </div>
    
    <script type="module" src="game.js"></script>
</body>
</html>
