<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        body {
            background-color: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #menu-stage {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        #menu-stage video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
        }

        .options-label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-size: 24px;
        }

        #volume-slider {
            width: min(450px, 100%);
            accent-color: red;
        }

        #volume-display {
            margin-top: 10px;
            font-size: 28px;
            color: #ddd;
        }

        #options-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            min-width: 320px;
            background-color: rgba(0, 0, 0, 0.9);
            border: 2px solid #fff;
            color: #fff;
            padding: 18px;
            border-radius: 10px;
            display: none;
            font-family: 'Arial', sans-serif;
        }

        #options-panel h2 {
            margin: 0 0 12px 0;
            font-size: 18px;
            text-align: center;
        }

        #options-panel input[type=range] {
            width: 100%;
        }

        #options-panel .close-btn {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #fff;
            cursor: pointer;
            font-size: 14px;
        }

        /* Mon panel Options est caché par défaut et s'affiche quand on clique sur Options */
    </style>
</head>
<body>
    <link rel="stylesheet" href="button.css">
    <link rel="stylesheet" href="game.css">
    <div id="game-container">
        <div id="menu-stage">
            <button id="Jouer">Jouer</button>
            <button id="Options">Options</button>
            <button id="Credits">Crédits</button>
            <button id="Quitter">Quitter</button>
            <div id="credits-modal" class="modal hidden">
                <div class="modal-content">
                    <button id="close-credits" class="close-btn">&times;</button>

                    <h2>Crédits</h2>
                    
                    <div class="credits-content credits-text">
                    <p>Jeu réalisé par Thomas Dhordain, Romain Voynier, Preston Walter-Bassette et Augustin Benoit.Tous les droits relatifs à la franchise originale, y compris les personnages, l'univers et les éléments associés, appartiennent à leur créateur, Scott Cawthon. </p>
                    </div>
                </div>
            </div>

            <div id="options-modal" class="modal hidden">
                <div class="modal-content">
                    <button id="close-options" class="close-btn">&times;</button>
                    <h2>Options</h2>
                    <label class="options-label" for="volume-slider">Volume du jeu</label>
                    <input id="volume-slider" type="range" min="0" max="100" step="1" value="50">
                    <p id="volume-display">50%</p>
                </div>
            </div>

        </div>
    </div>

    <div id="options-panel" aria-hidden="true">
        <h2>Options</h2>
        <label for="volume-slider">Volume : <span id="volume-value">100</span>%</label>
        <input id="volume-slider" type="range" min="0" max="100" value="100" step="1">
        <button id="close-options" class="close-btn">Fermer</button>
    </div>
    
    
    <script type="module" src="game.js"></script>
    <script type="module" src="menu.js"></script>
</body>
</html>
